version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env 
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./backend/sandbox:/app/sandbox  
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev